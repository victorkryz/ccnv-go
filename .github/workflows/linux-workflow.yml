name: Linux, build and test

on:
  push:
    branches: [ "main" ]
    
  workflow_dispatch:
        
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version-file: go.mod

    - name: Show Go version
      run: go version
        
    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v ./...

    - name: Run ccnv
      run: ./ccnv -f usd -a 10 -t eur

